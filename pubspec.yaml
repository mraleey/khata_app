name: khata_app
description: A Digital Khata (Ledger) mobile application for tracking customer transactions.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # GetX - State Management, DI, Routing
  get: ^4.6.6
  get_storage: ^2.1.1

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  # UI
  intl: ^0.19.0
  flutter_slidable: ^3.0.1
  lottie: ^3.1.0

  cupertino_icons: ^1.0.6
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
